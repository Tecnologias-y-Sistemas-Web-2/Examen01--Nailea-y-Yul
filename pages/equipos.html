<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Equipos Pokemon - Pokedex</title>
    <link rel="icon" type="image/png" href="../img/Favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../styles/formato.css" rel="stylesheet">
    <link href="../styles/equipos.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-sm navbar-dark" style="background:#2a75bb;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Pokedex</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="entrenadores.html">Entrenadores</a></li>
                <li class="nav-item"><a class="nav-link active" href="equipos.html">Equipos</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="header-top mb-3">
        <div class="brand-logo mb-2">
            <img src="../img/International_Pokémon_logo.svg" alt="Pokemon" class="pokemon-logo">
        </div>
        <div class="brand-line"></div>
    </div>

    <!-- Vista: lista de equipos -->
    <div id="vistaLista">
        <div class="d-flex justify-content-between align-items-center mt-4 mb-4 flex-wrap gap-2">
            <h2 class="fw-bold mb-0" style="color:#0f172a;">Equipos Pokemon</h2>
            <button class="btn btn-primary rounded-pill px-4 fw-bold" id="btnMostrarFormulario"
                    style="background:#2a75bb;border:none;">Nuevo equipo</button>
        </div>
        <div class="row" id="equiposContainer">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3">Cargando equipos...</p>
            </div>
        </div>
    </div>

    <!-- Vista: formulario -->
    <div id="vistaFormulario" style="display:none;">
        <h2 class="fw-bold mt-4 mb-4" style="color:#0f172a;">Nuevo Equipo Pokemon</h2>
        <div class="form-card">
            <div class="alerta-exito" id="alertaExito">Equipo guardado correctamente.</div>

            <div class="mb-3">
                <label class="form-label fw-bold" for="nombreEquipo">Nombre del equipo</label>
                <input type="text" id="nombreEquipo" class="form-control" placeholder="Ej: Equipo Fuego">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold" for="imagenEquipo">URL de imagen del grupo</label>
                <input type="url" id="imagenEquipo" class="form-control" placeholder="https://ejemplo.com/imagen.png">
                <div class="form-text">Puede usar un enlace de internet.</div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold" for="selectEntrenador">Entrenador encargado</label>
                <select id="selectEntrenador" class="form-select">
                    <option value="">Seleccionar entrenador</option>
                </select>
                <div class="form-text" id="textoEntrenador"></div>
            </div>

            <div class="mb-2">
                <label class="form-label fw-bold">Pokemons del equipo <span class="text-muted fw-normal">(max. 6)</span></label>
                <div class="pokemon-buscador">
                    <input type="text" id="buscarPokemon" class="form-control"
                           placeholder="Escriba el nombre del Pokemon..." autocomplete="off">
                    <div class="pokemon-sugerencias" id="sugerencias"></div>
                </div>
            </div>

            <div class="d-flex flex-wrap gap-2 mb-4 mt-2" id="pokemonsSeleccionados"></div>

            <div class="d-flex gap-3 align-items-center flex-wrap">
                <button class="btn-guardar" id="btnGuardar">Guardar equipo</button>
                <button class="btn btn-link text-secondary" id="btnCancelar">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal de detalle -->
<div class="modal fade detalle-modal" id="detalleModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <button class="btn-close-custom" data-bs-dismiss="modal">X</button>
            <div class="modal-name-bar">
                <span id="detNombre"></span>
            </div>
            <img id="detImagen" class="equipo-banner" src="" alt="Imagen del equipo">
            <p class="mb-3">
                <span class="info-label">Entrenador: </span>
                <span id="detEntrenador"></span>
            </p>
            <h5 class="fw-bold mb-3" style="color:#0f172a;">Pokemons del equipo</h5>
            <ul class="pokemon-lista" id="detPokemons"></ul>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../code/equipos.js"></script>

</body>
</html>
