<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pokedex</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../styles/formato.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <div class="header-top mb-3">
        <div class="brand-logo mb-3">
            <img src="../img/International_Pokémon_logo.svg" alt="Pokémon" class="pokemon-logo">
        </div>
        <div class="brand-line"></div>
    </div>
    <div class="header-row d-flex justify-content-end align-items-center mb-4 flex-column flex-sm-row flex-sm-wrap">
        <div class="generation-label me-3 mb-2 mb-sm-0">Generación</div>
        <div class="header-control">
            <label for="cmbGeneracion" class="form-label visually-hidden">Seleccionar generación</label>
            <select id="cmbGeneracion" class="form-select">
                <option value="0,151">Primera Generación</option>
                <option value="151,100">Segunda Generación</option>
                <option value="251,135">Tercera Generación</option>
                <option value="386,107">Cuarta Generación</option>
                <option value="493,156">Quinta Generación</option>
            </select>
        </div>
    </div>

    <div class="row" id="pokemonContainer"></div>

</div>

<div class="modal fade" id="pokemonModal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <button class="btn-close modal-close-btn" data-bs-dismiss="modal" aria-label="Cerrar"></button>

            <div class="modal-name-header">
                <img src="../img/International_Pokémon_logo.svg" alt="Pokémon" class="modal-pokemon-logo">
                <div class="modal-name-bar">
                    <span id="modalNombre"></span>
                </div>
            </div>

            <div class="modal-body">

                <div class="modal-left">
                    <img id="modalImagen" width="200">
                    <p class="modal-meta"><span id="modalGeneracion"></span> &bull; <span id="modalId"></span></p>
                </div>

                <div class="modal-right">

                    <ul id="modalTipos"></ul>

                    <p class="modal-size">
                        Height: <span id="modalAltura"></span> &mdash; Weight: <span id="modalPeso"></span>
                    </p>

                    <h4 class="modal-section-title">Habilidades</h4>
                    <ul id="modalHabilidades"></ul>

                    <h4 class="modal-section-title">Movimientos</h4>
                    <p id="modalMovimientos"></p>

                </div>

            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>

</body>
</html>
