<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pokedex</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .pokemon-card{
            cursor:pointer;
            transition:0.3s;
            margin-bottom:20px;
        }

        .pokemon-card:hover{
            transform:scale(1.05);
        }

        .pokemon-card img{
            height:120px;
            object-fit:contain;
        }
    </style>
</head>
<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">Pokédex</h1>

    <select id="cmbGeneracion" class="form-select mb-4">
        <option value="0,151">Primera Generación</option>
        <option value="151,100">Segunda Generación</option>
        <option value="251,135">Tercera Generación</option>
        <option value="386,107">Cuarta Generación</option>
        <option value="493,156">Quinta Generación</option>
    </select>

    <div class="row" id="pokemonContainer"></div>

</div>

<div class="modal fade" id="pokemonModal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 id="modalNombre"></h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <div class="text-center">
                    <img id="modalImagen" width="200">
                </div>

                <p><b>ID:</b> <span id="modalId"></span></p>
                <p><b>Altura:</b> <span id="modalAltura"></span></p>
                <p><b>Peso:</b> <span id="modalPeso"></span></p>

                <p><b>Tipos:</b></p>
                <ul id="modalTipos"></ul>

                <p><b>Habilidades:</b></p>
                <ul id="modalHabilidades"></ul>

                <p><b>Movimientos:</b></p>
                <ul id="modalMovimientos"></ul>

            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>

</body>
</html>
