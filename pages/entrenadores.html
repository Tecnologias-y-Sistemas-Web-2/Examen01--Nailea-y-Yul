<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Entrenadores Pokemon - Pokedex</title>
    <link rel="icon" type="image/png" href="../img/Favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../styles/formato.css" rel="stylesheet">
    <link href="../styles/equipos.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-sm navbar-dark" style="background:#2a75bb;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Pokedex</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link active" href="entrenadores.html">Entrenadores</a></li>
                <li class="nav-item"><a class="nav-link" href="equipos.html">Equipos</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div class="header-top mb-3">
        <div class="brand-logo mb-2">
            <img src="../img/International_Pokémon_logo.svg" alt="Pokemon" class="pokemon-logo">
        </div>
        <div class="brand-line"></div>
    </div>

    <!-- Vista: lista de entrenadores -->
    <div id="vistaLista">
        <div class="d-flex justify-content-between align-items-center mt-4 mb-4 flex-wrap gap-2">
            <h2 class="fw-bold mb-0" style="color:#0f172a;">Entrenadores Pokemon</h2>
            <button class="btn btn-primary rounded-pill px-4 fw-bold" id="btnMostrarFormulario"
                    style="background:#2a75bb;border:none;">Nuevo entrenador</button>
        </div>
        <div class="row" id="entrenadoresContainer">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3">Cargando entrenadores...</p>
            </div>
        </div>
    </div>

    <!-- Vista: formulario -->
    <div id="vistaFormulario" style="display:none;">
        <h2 class="fw-bold mt-4 mb-4" style="color:#0f172a;">Nuevo Entrenador Pokemon</h2>
        <div class="form-card">
            <div class="alerta-exito" id="alertaExito">Entrenador guardado correctamente.</div>

            <div class="mb-3">
                <label class="form-label fw-bold" for="nombreEntrenador">Nombre y apellidos</label>
                <input type="text" id="nombreEntrenador" class="form-control" placeholder="Ingresa el nombre completo">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold" for="sexoEntrenador">Sexo</label>
                <select id="sexoEntrenador" class="form-select">
                    <option value="">Selecciona</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                    <option value="No binario">No binario</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold" for="residenciaEntrenador">Lugar de residencia</label>
                <input type="text" id="residenciaEntrenador" class="form-control" placeholder="Ciudad o región">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold" for="fotoEntrenador">URL de foto del entrenador</label>
                <input type="url" id="fotoEntrenador" class="form-control" placeholder="https://">
                <div class="form-text">Puede usar un enlace de internet.</div>
            </div>

            <div class="d-flex gap-3 align-items-center flex-wrap">
                <button class="btn-guardar" id="btnGuardar">Guardar entrenador</button>
                <button class="btn btn-link text-secondary" id="btnCancelar">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal de detalle -->
<div class="modal fade detalle-modal" id="detalleModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <button class="btn-close-custom" data-bs-dismiss="modal">X</button>
            <div class="modal-name-bar">
                <span id="detNombre"></span>
            </div>
            <img id="detFoto" class="equipo-banner" src="" alt="Foto del entrenador">
            <p class="mb-3">
                <span class="info-label">Sexo: </span>
                <span id="detSexo"></span>
            </p>
            <p class="mb-3">
                <span class="info-label">Residencia: </span>
                <span id="detResidencia"></span>
            </p>
            <div class="mt-3">
                <button id="btnEliminarEntrenador" class="btn btn-danger">Eliminar entrenador</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../code/entrenadores.js"></script>

</body>
</html>
