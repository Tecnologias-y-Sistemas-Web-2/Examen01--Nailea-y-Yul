<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Entrenadores - Pokedex</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../styles/formato.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <nav class="navbar navbar-expand-lg navbar-light mb-4 px-0">
        <div class="container-fluid px-0">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="../img/International_Pok%C3%A9mon_logo.svg" alt="Pokémon" class="pokemon-logo me-2" style="max-width: 180px;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu" aria-controls="mainMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Pokédex</a></li>
                    <li class="nav-item"><a class="nav-link" href="equipos.html">Equipos</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="entrenadores.html">Entrenadores</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
        <div>
            <h1 class="page-title">Entrenadores</h1>
            <p class="text-muted mb-0">Consulta aquí los perfiles guardados desde la base de datos local.</p>
        </div>
        <a href="agregar-entrenador.html" class="btn btn-primary">Agregar entrenador</a>
    </div>

    <div id="trainersAlert"></div>
    <div class="row" id="trainerContainer"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../code/entrenadores.js"></script>
<script>
    async function mostrarEntrenadores() {
        const container = document.getElementById('trainerContainer');
        const alert = document.getElementById('trainersAlert');
        container.innerHTML = '';
        alert.innerHTML = '';

        try {
            const entrenadores = await obtenerEntrenadores();
            if (!entrenadores || entrenadores.length === 0) {
                alert.innerHTML = '<div class="alert alert-info">No hay entrenadores registrados. Usa el botón "Agregar entrenador" para crear perfiles.</div>';
                return;
            }

            entrenadores.forEach(entrenador => {
                const columna = document.createElement('div');
                columna.className = 'col-12 col-sm-6 col-lg-4 mb-4';
                columna.innerHTML = `
                    <div class="card trainer-card h-100 shadow-sm">
                        <img src="${entrenador.foto}" alt="Foto de ${entrenador.nombre}" class="card-img-top trainer-photo">
                        <div class="card-body">
                            <h5 class="card-title mb-1">${entrenador.nombre}</h5>
                            <p class="trainer-label mb-1"><strong>Sexo:</strong> ${entrenador.sexo}</p>
                            <p class="trainer-label mb-0"><strong>Residencia:</strong> ${entrenador.residencia}</p>
                        </div>
                    </div>`;
                container.appendChild(columna);
            });
        } catch (error) {
            alert.innerHTML = `<div class="alert alert-danger">No fue posible cargar los entrenadores. ${error.message || ''}</div>`;
        }
    }

    document.addEventListener('DOMContentLoaded', mostrarEntrenadores);
</script>

</body>
</html>
