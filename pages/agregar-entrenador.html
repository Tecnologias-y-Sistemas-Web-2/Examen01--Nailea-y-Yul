<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Entrenador - Pokedex</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../styles/formato.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <nav class="navbar navbar-expand-lg navbar-light mb-4 px-0">
        <div class="container-fluid px-0">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="../img/International_Pok%C3%A9mon_logo.svg" alt="Pokémon" class="pokemon-logo me-2" style="max-width: 180px;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu" aria-controls="mainMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainMenu">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Pokédex</a></li>
                    <li class="nav-item"><a class="nav-link" href="equipos.html">Equipos</a></li>
                    <li class="nav-item"><a class="nav-link" href="entrenadores.html">Entrenadores</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="mb-4">
        <h1 class="page-title">Agregar entrenador</h1>
        <p class="text-muted">Completa el formulario para crear un nuevo perfil de entrenador en IndexedDB.</p>
    </div>

    <div id="formAlert"></div>

    <form id="trainerForm" class="bg-white p-4 rounded-4 shadow-sm">
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre y apellidos</label>
            <input type="text" id="nombre" class="form-control" placeholder="Ingresa el nombre completo" required>
        </div>
        <div class="mb-3">
            <label for="sexo" class="form-label">Sexo</label>
            <select id="sexo" class="form-select" required>
                <option value="">Selecciona</option>
                <option value="Masculino">Masculino</option>
                <option value="Femenino">Femenino</option>
                <option value="No binario">No binario</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="residencia" class="form-label">Lugar de residencia</label>
            <input type="text" id="residencia" class="form-control" placeholder="Ciudad o región" required>
        </div>
        <div class="mb-3">
            <label for="foto" class="form-label">URL de foto del entrenador</label>
            <input type="url" id="foto" class="form-control" placeholder="https://" required>
        </div>
        <button type="submit" class="btn btn-primary">Guardar entrenador</button>
        <a href="entrenadores.html" class="btn btn-outline-secondary ms-2">Volver a entrenadores</a>
    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../code/entrenadores.js"></script>
<script>
    const trainerForm = document.getElementById('trainerForm');
    const formAlert = document.getElementById('formAlert');

    trainerForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        formAlert.innerHTML = '';

        const nuevoEntrenador = {
            nombre: document.getElementById('nombre').value.trim(),
            sexo: document.getElementById('sexo').value,
            residencia: document.getElementById('residencia').value.trim(),
            foto: document.getElementById('foto').value.trim()
        };

        try {
            await agregarEntrenador(nuevoEntrenador);
            formAlert.innerHTML = '<div class="alert alert-success">Entrenador guardado correctamente. <strong>Listo para consultarlo en la página de entrenadores.</strong></div>';
            trainerForm.reset();
        } catch (error) {
            formAlert.innerHTML = `<div class="alert alert-danger">No fue posible guardar el entrenador. ${error.message || ''}</div>`;
        }
    });
</script>

</body>
</html>
